<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Klondike Logger iPhone Working</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation}html,body{margin:0;padding:0;background:#111827;color:#f9fafb;font-family:Arial,sans-serif;overscroll-behavior:none}body{padding:6px 8px 12px}h1{font-size:21px;text-align:center;margin:4px 0 6px;line-height:1.1}.top{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:5px}.btn{border:0;border-radius:10px;color:#fff;font-weight:800;font-size:18px;min-height:40px;padding:5px 2px}.btn:active,.card:active,.zone:active{transform:scale(.96);opacity:.85}.undo{background:#9a4610}.next{background:#2554d8}.copy{background:#176b35}.clear{background:#9d1c1c}.zones{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin:4px 0 5px}.zone{border:2px solid transparent;border-radius:8px;background:#1f2937;color:#fff;font-size:14px;line-height:1.0;font-weight:900;min-height:34px;padding:3px 0}.zone.active{background:#07583f;border-color:#22c55e}.summary{border:1px solid #334155;border-radius:9px;min-height:38px;padding:5px 7px;font-size:14px;line-height:1.25;background:#0f172a;margin-bottom:4px}.summary b{color:#86efac}.label{font-size:15px;font-weight:900;color:#cbd5e1;margin:3px 0}.logged{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;min-height:22px;margin-bottom:4px}.logged button{border:1px solid #475569;background:#334155;color:#fff;border-radius:6px;min-height:22px;font-size:11px;font-weight:900;padding:1px}.logged button.sel{background:#713f12;border-color:#facc15}.edit{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:3px 0}.edit .btn{font-size:16px;min-height:34px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}.card{border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc;color:#111827;font-weight:900;font-size:23px;height:34px;padding:0}.red{color:#b91c1c}.used{background:#475569!important;color:#94a3b8!important;text-decoration:line-through;border-color:#334155!important}.out{width:100%;height:95px;border-radius:9px;border:1px solid #334155;background:#020617;color:#e5e7eb;padding:6px;font-family:Consolas,monospace;font-size:12px}.status{font-size:12px;text-align:center;color:#9ca3af;min-height:14px;margin-top:2px}.hide{display:none!important}
@media(max-height:750px){h1{font-size:18px}.btn{min-height:34px;font-size:16px}.zone{min-height:29px;font-size:12px}.summary{font-size:12px;min-height:32px}.label{font-size:13px}.edit .btn{min-height:29px;font-size:14px}.card{height:29px;font-size:20px}.out{height:70px}}
</style>
</head>
<body>
<h1>Klondike Logger</h1>
<div class="top">
<button type="button" class="btn undo" onclick="undoLast()">Undo</button>
<button type="button" class="btn next" onclick="nextZone()">Next</button>
<button type="button" class="btn copy" onclick="copyOut()">Copy</button>
<button type="button" class="btn clear" onclick="clearAll()">Clear</button>
</div>
<div class="zones">
<button type="button" id="zDeck" class="zone active" onclick="setZone('Deck')">D<br><span id="cDeck">0/24</span></button>
<button type="button" id="zLane 1" class="zone" onclick="setZone('Lane 1')">L1<br><span id="cLane 1">0/1</span></button>
<button type="button" id="zLane 2" class="zone" onclick="setZone('Lane 2')">L2<br><span id="cLane 2">0/2</span></button>
<button type="button" id="zLane 3" class="zone" onclick="setZone('Lane 3')">L3<br><span id="cLane 3">0/3</span></button>
<button type="button" id="zLane 4" class="zone" onclick="setZone('Lane 4')">L4<br><span id="cLane 4">0/4</span></button>
<button type="button" id="zLane 5" class="zone" onclick="setZone('Lane 5')">L5<br><span id="cLane 5">0/5</span></button>
<button type="button" id="zLane 6" class="zone" onclick="setZone('Lane 6')">L6<br><span id="cLane 6">0/6</span></button>
<button type="button" id="zLane 7" class="zone" onclick="setZone('Lane 7')">L7<br><span id="cLane 7">0/7</span></button>
</div>
<div id="summary" class="summary">Loading...</div>
<div class="label">Logged cards</div>
<div id="logged" class="logged"></div>
<div class="edit"><button type="button" class="btn clear" onclick="removeSelected()">Remove</button><button type="button" class="btn" style="background:#6d28d9" onclick="cancelReplace()">Cancel</button></div>
<div class="label">Tap cards</div>
<div id="cards" class="cards">
<button type="button" id="card_Ac" class="card" onclick="tap('Ac')">A♣</button><button type="button" id="card_Ad" class="card red" onclick="tap('Ad')">A♦</button><button type="button" id="card_Ah" class="card red" onclick="tap('Ah')">A♥</button><button type="button" id="card_As" class="card" onclick="tap('As')">A♠</button>
<button type="button" id="card_2c" class="card" onclick="tap('2c')">2♣</button><button type="button" id="card_2d" class="card red" onclick="tap('2d')">2♦</button><button type="button" id="card_2h" class="card red" onclick="tap('2h')">2♥</button><button type="button" id="card_2s" class="card" onclick="tap('2s')">2♠</button>
<button type="button" id="card_3c" class="card" onclick="tap('3c')">3♣</button><button type="button" id="card_3d" class="card red" onclick="tap('3d')">3♦</button><button type="button" id="card_3h" class="card red" onclick="tap('3h')">3♥</button><button type="button" id="card_3s" class="card" onclick="tap('3s')">3♠</button>
<button type="button" id="card_4c" class="card" onclick="tap('4c')">4♣</button><button type="button" id="card_4d" class="card red" onclick="tap('4d')">4♦</button><button type="button" id="card_4h" class="card red" onclick="tap('4h')">4♥</button><button type="button" id="card_4s" class="card" onclick="tap('4s')">4♠</button>
<button type="button" id="card_5c" class="card" onclick="tap('5c')">5♣</button><button type="button" id="card_5d" class="card red" onclick="tap('5d')">5♦</button><button type="button" id="card_5h" class="card red" onclick="tap('5h')">5♥</button><button type="button" id="card_5s" class="card" onclick="tap('5s')">5♠</button>
<button type="button" id="card_6c" class="card" onclick="tap('6c')">6♣</button><button type="button" id="card_6d" class="card red" onclick="tap('6d')">6♦</button><button type="button" id="card_6h" class="card red" onclick="tap('6h')">6♥</button><button type="button" id="card_6s" class="card" onclick="tap('6s')">6♠</button>
<button type="button" id="card_7c" class="card" onclick="tap('7c')">7♣</button><button type="button" id="card_7d" class="card red" onclick="tap('7d')">7♦</button><button type="button" id="card_7h" class="card red" onclick="tap('7h')">7♥</button><button type="button" id="card_7s" class="card" onclick="tap('7s')">7♠</button>
<button type="button" id="card_8c" class="card" onclick="tap('8c')">8♣</button><button type="button" id="card_8d" class="card red" onclick="tap('8d')">8♦</button><button type="button" id="card_8h" class="card red" onclick="tap('8h')">8♥</button><button type="button" id="card_8s" class="card" onclick="tap('8s')">8♠</button>
<button type="button" id="card_9c" class="card" onclick="tap('9c')">9♣</button><button type="button" id="card_9d" class="card red" onclick="tap('9d')">9♦</button><button type="button" id="card_9h" class="card red" onclick="tap('9h')">9♥</button><button type="button" id="card_9s" class="card" onclick="tap('9s')">9♠</button>
<button type="button" id="card_Tc" class="card" onclick="tap('Tc')">T♣</button><button type="button" id="card_Td" class="card red" onclick="tap('Td')">T♦</button><button type="button" id="card_Th" class="card red" onclick="tap('Th')">T♥</button><button type="button" id="card_Ts" class="card" onclick="tap('Ts')">T♠</button>
<button type="button" id="card_Jc" class="card" onclick="tap('Jc')">J♣</button><button type="button" id="card_Jd" class="card red" onclick="tap('Jd')">J♦</button><button type="button" id="card_Jh" class="card red" onclick="tap('Jh')">J♥</button><button type="button" id="card_Js" class="card" onclick="tap('Js')">J♠</button>
<button type="button" id="card_Qc" class="card" onclick="tap('Qc')">Q♣</button><button type="button" id="card_Qd" class="card red" onclick="tap('Qd')">Q♦</button><button type="button" id="card_Qh" class="card red" onclick="tap('Qh')">Q♥</button><button type="button" id="card_Qs" class="card" onclick="tap('Qs')">Q♠</button>
<button type="button" id="card_Kc" class="card" onclick="tap('Kc')">K♣</button><button type="button" id="card_Kd" class="card red" onclick="tap('Kd')">K♦</button><button type="button" id="card_Kh" class="card red" onclick="tap('Kh')">K♥</button><button type="button" id="card_Ks" class="card" onclick="tap('Ks')">K♠</button>
</div>
<div class="label">Solver Output</div>
<textarea id="output" class="out" readonly></textarea>
<div id="status" class="status">Ready</div>
<script>
var zones=['Deck','Lane 1','Lane 2','Lane 3','Lane 4','Lane 5','Lane 6','Lane 7'];
var limits={'Deck':24,'Lane 1':1,'Lane 2':2,'Lane 3':3,'Lane 4':4,'Lane 5':5,'Lane 6':6,'Lane 7':7};
var cards=['Ac','Ad','Ah','As','2c','2d','2h','2s','3c','3d','3h','3s','4c','4d','4h','4s','5c','5d','5h','5s','6c','6d','6h','6s','7c','7d','7h','7s','8c','8d','8h','8s','9c','9d','9h','9s','Tc','Td','Th','Ts','Jc','Jd','Jh','Js','Qc','Qd','Qh','Qs','Kc','Kd','Kh','Ks'];
var data={}, moves=[], active='Deck', selectedZone=null, selectedIndex=-1;
for(var i=0;i<zones.length;i++){data[zones[i]]=[];}
function msg(t){document.getElementById('status').textContent=t;}
function used(code){for(var i=0;i<zones.length;i++){if(data[zones[i]].indexOf(code)>-1){return true;}}return false;}
function setZone(z){active=z;selectedZone=null;selectedIndex=-1;render();}
function tap(code){msg('Tapped '+code);if(selectedZone!==null){replaceCard(code);return;}if(data[active].length>=limits[active]){msg(active+' is full');return;}if(used(code)){msg(code+' already used');return;}data[active].push(code);moves.push({a:'add',z:active,c:code});render();}
function replaceCard(code){var old=data[selectedZone][selectedIndex];if(code!==old&&used(code)){msg(code+' already used');return;}data[selectedZone][selectedIndex]=code;moves.push({a:'rep',z:selectedZone,i:selectedIndex,o:old,n:code});selectedZone=null;selectedIndex=-1;msg('Replaced '+old+' with '+code);render();}
function pick(i){selectedZone=active;selectedIndex=i;msg('Selected '+data[active][i]+'. Tap replacement.');render();}
function removeSelected(){if(selectedZone===null){msg('Tap a logged card first');return;}var old=data[selectedZone].splice(selectedIndex,1)[0];moves.push({a:'rem',z:selectedZone,i:selectedIndex,c:old});selectedZone=null;selectedIndex=-1;msg('Removed '+old);render();}
function cancelReplace(){selectedZone=null;selectedIndex=-1;msg('Canceled');render();}
function nextZone(){var i=zones.indexOf(active);active=zones[(i+1)%zones.length];selectedZone=null;selectedIndex=-1;render();}
function undoLast(){var h=moves.pop();if(!h){msg('Nothing to undo');return;}if(h.a==='add'){var a=data[h.z];var i=a.lastIndexOf(h.c);if(i>-1){a.splice(i,1);}active=h.z;}else if(h.a==='rep'){data[h.z][h.i]=h.o;active=h.z;}else if(h.a==='rem'){data[h.z].splice(h.i,0,h.c);active=h.z;}selectedZone=null;selectedIndex=-1;msg('Undone');render();}
function clearAll(){if(!confirm('Clear all cards?'))return;for(var i=0;i<zones.length;i++){data[zones[i]]=[];}moves=[];active='Deck';selectedZone=null;selectedIndex=-1;msg('Cleared');render();}
function outText(){var l=[];l.push('Deck:');for(var i=0;i<data['Deck'].length;i++)l.push(data['Deck'][i]);l.push('');for(var n=1;n<=7;n++){var z='Lane '+n;l.push(z+':');for(var j=0;j<data[z].length;j++)l.push(data[z][j]);if(n<7)l.push('');}return l.join('\n');}
function copyOut(){var text=outText();var o=document.getElementById('output');o.value=text;o.removeAttribute('readonly');o.focus();o.select();o.setSelectionRange(0,99999);var ok=false;try{ok=document.execCommand('copy');}catch(e){}o.setAttribute('readonly','readonly');if(ok){msg('Copied');return;}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){msg('Copied');},function(){msg('iPhone blocked auto-copy. Long press output > Copy.');});}else{msg('Long press output > Copy.');}}
function render(){for(var i=0;i<zones.length;i++){var z=zones[i];var id='z'+z;var b=document.getElementById(id);if(b){b.className='zone'+(z===active?' active':'');}var c=document.getElementById('c'+z);if(c){c.textContent=data[z].length+'/'+limits[z];}}
var total=0;for(var k=0;k<zones.length;k++)total+=data[zones[k]].length;document.getElementById('summary').innerHTML='Active: <b>'+active+'</b> ('+data[active].length+'/'+limits[active]+') &nbsp; Total: <b>'+total+'/52</b><br>'+active+': '+(data[active].join(' ')||'none');
var lg=document.getElementById('logged');lg.innerHTML='';for(var x=0;x<data[active].length;x++){var b=document.createElement('button');b.type='button';b.textContent=data[active][x];b.setAttribute('data-i',x);if(selectedZone===active&&selectedIndex===x)b.className='sel';b.onclick=function(){pick(parseInt(this.getAttribute('data-i'),10));};lg.appendChild(b);}for(var q=0;q<cards.length;q++){var cb=document.getElementById('card_'+cards[q]);if(cb){var base=cb.className.replace(' used','');cb.className=base+(used(cards[q])?' used':'');}}document.getElementById('output').value=outText();}
window.onload=function(){render();msg('Ready - buttons active');};
render();
</script>
</body>
</html>
